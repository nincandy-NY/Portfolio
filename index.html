<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - Remote Camera</title>
    <link rel="icon" href="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOGQycnB2ZGZ0NWo2azZ5MHM3ZzNnNzM3c3p3a2F5Z2F4Y3Mxd2d5ZyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/kL1KAdQYmKXle/giphy.gif">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-black: #0b0b0b;
            --card-dark: #161616;
            --main-purple: #8b5cf6;
            --dark-purple: #4c1d95;
            --text-gray: #a1a1aa;
            --white: #ffffff;
            --modal-bg: rgba(0, 0, 0, 0.9);
            --online-green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-black); color: var(--white); line-height: 1.5; scroll-behavior: smooth; }

        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--dark-purple);
            background: var(--bg-black);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 1.5rem; font-weight: 600; color: var(--main-purple); }
        nav ul { display: flex; list-style: none; align-items: center; }
        nav ul li { margin-left: 20px; }
        nav ul li a { text-decoration: none; color: var(--white); font-size: 0.9rem; }

        .online-status {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--main-purple);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--main-purple);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--online-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--online-green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Camera Styles */
        .camera-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .video-box {
            background: var(--card-dark);
            border: 2px solid #333;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .video-box p { margin-bottom: 10px; color: var(--main-purple); font-size: 0.9rem; }
        video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 10px;
            object-fit: cover;
        }
        .btn-call {
            background: var(--main-purple);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-call:hover { background: var(--dark-purple); }

        section { padding: 60px 10%; }
        h2 { font-size: 1.8rem; margin-bottom: 30px; border-left: 5px solid var(--main-purple); padding-left: 15px; }

        footer { padding: 40px; background: #000; text-align: center; border-top: 1px solid #222; color: #444; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CAM MONITOR</div>
        <ul>
            <li><div class="online-status"><span class="dot"></span> Online: <span id="online-count">1</span></div></li>
            <li><a href="#camera">กล้องสด</a></li>
        </ul>
    </nav>

    <section id="camera">
        <h2>ระบบส่องกล้อง Real-time</h2>
        <p style="color: var(--text-gray);">กดปุ่ม "เปิดกล้อง" เพื่อเริ่มแชร์วิดีโอของคุณ และรับชมกล้องจากเครื่องอื่นที่เชื่อมต่อ</p>
        
        <div class="camera-container">
            <div class="video-box">
                <p>● กล้องของคุณ (Local)</p>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
            <div class="video-box">
                <p>● กล้องที่กำลังรับชม (Remote)</p>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <div style="text-align: center;">
            <button id="startBtn" class="btn-call">เปิดกล้องและเริ่มเชื่อมต่อ</button>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 nincandy | WebRTC via Firebase</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
